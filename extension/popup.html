<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tab Auto Grouper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #202124;
      background: #fff;
    }
    header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      border-bottom: 1px solid #e8eaed;
      padding-bottom: 10px;
    }
    header img { width: 20px; height: 20px; }
    header h1 { font-size: 14px; font-weight: 600; }
    #groups { margin-bottom: 10px; }
    .group-item {
      padding: 5px 8px;
      margin: 3px 0;
      border-radius: 4px;
      background: #f1f3f4;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .group-name { font-weight: 500; }
    .group-count { color: #5f6368; font-size: 11px; }
    .empty { color: #9aa0a6; padding: 4px 0; }
    button {
      width: 100%;
      padding: 7px 12px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
    }
    button + button { margin-top: 6px; }
    button:hover { background: #1557b0; }
    button:disabled { background: #9aa0a6; cursor: default; color: #fff; border-color: transparent; }
    button.secondary { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
    button.secondary:hover { background: #f1f3f4; }
    #status { color: #5f6368; font-size: 11px; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>
  <header>
    <img src="icons/icon48.png" alt="">
    <h1>Tab Auto Grouper</h1>
  </header>

  <div id="groups"><div class="empty">Loading…</div></div>

  <button id="groupAllBtn">Group all open tabs</button>
  <button id="reloadBtn" class="secondary">Reload Config</button>
  <button id="collapseBtn" class="secondary">Collapse All</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
